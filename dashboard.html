<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九巴專屬 Dashboard</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: "Helvetica Neue", sans-serif; 
            margin: 0; padding: 30px; box-sizing: border-box; height: 100vh;
            display: flex; flex-direction: column;
        }
        .top-section { display: flex; justify-content: space-between; align-items: flex-start; height: 35%; }
        .clock { font-size: 7rem; font-weight: bold; margin: 0; color: #00e5ff; }
        .date { font-size: 2rem; color: #aaa; margin-top: -15px; }
        
        .weather-box { width: 45%; }
        
        .bus-container { display: flex; gap: 20px; margin-top: 20px; flex-grow: 1; }
        .bus-card {
            background: #1a1a1a; padding: 25px; border-radius: 20px; flex: 1; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .bus-route { font-size: 4.5rem; color: #ffcc00; margin: 0; font-weight: bold; line-height: 1; }
        .bus-dest { color: #888; font-size: 1.5rem; margin: 10px 0 20px 0; }
        .bus-eta { font-size: 4.5rem; color: #39ff14; font-weight: bold; }
        .loading-text { font-size: 2rem; color: #888; }
    </style>
</head>
<body>

    <div class="top-section">
        <div>
            <div class="clock" id="clock-display">00:00</div>
            <div class="date" id="date-display">載入中...</div>
        </div>
        <div class="weather-box">
            <a class="weatherwidget-io" href="https://forecast7.com/en/22d32114d17/hong-kong/" data-label_1="香港" data-label_2="實時天氣" data-theme="dark" >香港 實時天氣</a>
            <script>
            !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
            </script>
        </div>
    </div>

    <div class="bus-container">
        <div class="bus-card">
            <h2 class="bus-route">260C</h2>
            <p class="bus-dest">荃景圍天橋 ➔ 屯門 (三聖)</p>
            <div class="bus-eta" id="bus1-eta"><span class="loading-text">連線中...</span></div>
        </div>
        <div class="bus-card">
            <h2 class="bus-route">60M</h2>
            <p class="bus-dest">荃景圍天橋 ➔ 屯門站</p>
            <div class="bus-eta" id="bus2-eta"><span class="loading-text">連線中...</span></div>
        </div>
    </div>

    <script>
        // 1. 更新時鐘
        function updateTime() {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('zh-HK', {hour12: false, hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-HK', {month: 'long', day: 'numeric', weekday: 'long'});
        }

        // 2. 固定車站 ID 直連寫法（荃景圍天橋往屯門方向的官方代碼）
        // 經查證，260C 和 60M 往屯門方向在荃景圍天橋的九巴官方內部車站 ID 為：A9A35F4C75D799DF
        const stopId = "A9A35F4C75D799DF";

        async function updateAllETA() {
            try {
                // 直接讀取該車站的所有巴士線到站時間
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
                const data = await res.json();
                
                if (data && data.data) {
                    displayETA(data.data, '260C', 'bus1-eta');
                    displayETA(data.data, '60M', 'bus2-eta');
                }
            } catch(e) {
                document.getElementById('bus1-eta').innerText = '網絡連線有誤';
                document.getElementById('bus2-eta').innerText = '網絡連線有誤';
            }
        }

        function displayETA(allEtas, route, elementId) {
            // 過濾出對應路線、往新界方向(O)，且有時間的班次
            const validEtas = allEtas.filter(eta => 
                eta.route === route && eta.dir === 'O' && eta.eta !== null && eta.eta !== ""
            );
            
            // 按時間排序
            validEtas.sort((a, b) => new Date(a.eta) - new Date(b.eta));
            
            if(validEtas.length > 0) {
                const etaTime = new Date(validEtas[0].eta);
                const diffMinutes = Math.floor((etaTime - new Date()) / 60000);
                
                if (diffMinutes <= 0) {
                    document.getElementById(elementId).innerText = '即將到站';
                    document.getElementById(elementId).style.color = '#ff3333';
                } else {
                    document.getElementById(elementId).innerText = diffMinutes + ' 分鐘';
                    document.getElementById(elementId).style.color = '#39ff14';
                }
            } else {
                document.getElementById(elementId).innerHTML = '<span class="loading-text">暫無班次</span>';
            }
        }

        window.onload = function() {
            updateTime();
            setInterval(updateTime, 1000);
            updateAllETA();
            setInterval(updateAllETA, 30000); // 每 30 秒自動更新巴士時間
        };
    </script>
</body>
</html>
