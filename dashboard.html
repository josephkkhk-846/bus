<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>巴士到站時間 (260C / 60M)</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .clock { font-size: 6rem; color: #00e5ff; font-weight: bold; }
        .container { display: flex; gap: 40px; margin-top: 50px; }
        .card { background: #1a1a1a; padding: 40px; border-radius: 20px; text-align: center; width: 300px; }
        .route { font-size: 4rem; color: #ffcc00; }
        .eta { font-size: 5rem; color: #39ff14; font-weight: bold; }
    </style>
</head>
<body>
    <div class="clock" id="clock">00:00</div>
    <div class="container">
        <div class="card">
            <div class="route">260C</div>
            <div class="eta" id="bus1">載入中...</div>
        </div>
        <div class="card">
            <div class="route">60M</div>
            <div class="eta" id="bus2">載入中...</div>
        </div>
    </div>

    <script>
        // 更新時鐘
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-HK', {hour12: false, hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // 使用更穩定的請求方式
        async function fetchETA() {
            try {
                // 我們依然需要一個代理來繞過瀏覽器的 CORS 安全限制，這裡使用另一個穩定的代理服務
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/A9A35F4C75D799DF'));
                const json = await response.json();
                const data = JSON.parse(json.contents).data;
                
                updateDisplay(data, '260C', 'bus1');
                updateDisplay(data, '60M', 'bus2');
            } catch (err) {
                document.getElementById('bus1').innerText = "失敗";
                document.getElementById('bus2').innerText = "失敗";
            }
        }

        function updateDisplay(data, route, id) {
            const bus = data.find(b => b.route === route && b.dir === 'O');
            if (bus && bus.eta) {
                const mins = Math.floor((new Date(bus.eta) - new Date()) / 60000);
                document.getElementById(id).innerText = mins <= 0 ? "到站" : mins + " 分";
            } else {
                document.getElementById(id).innerText = "無班次";
            }
        }

        fetchETA();
        setInterval(fetchETA, 30000);
    </script>
</body>
</html>
