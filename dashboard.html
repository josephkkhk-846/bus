<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九巴專屬 Dashboard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        .clock { font-size: 5rem; color: #00e5ff; font-weight: bold; margin: 0; }
        .bus-container { display: flex; gap: 15px; margin-top: 20px; flex-grow: 1; }
        .bus-card { background: #222; padding: 20px; border-radius: 15px; flex: 1; text-align: center; }
        .bus-route { font-size: 3rem; color: #ffcc00; margin: 0; }
        .bus-eta { font-size: 3.5rem; color: #39ff14; font-weight: bold; }
    </style>
</head>
<body>
    <div class="clock" id="clock">00:00</div>
    <div class="bus-container">
        <div class="bus-card">
            <h2 class="bus-route">260C</h2>
            <div class="bus-eta" id="bus1">讀取中...</div>
        </div>
        <div class="bus-card">
            <h2 class="bus-route">60M</h2>
            <div class="bus-eta" id="bus2">讀取中...</div>
        </div>
    </div>

    <script>
        function updateTime() {
            var now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-HK', {hour12: false, hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 關鍵修改：使用 cors-anywhere 作為強效中轉，確保舊 iPad 能夠穿透安全牆
        var stopId = "A9A35F4C75D799DF";
        var apiUrl = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/" + stopId;
        var proxy = "https://corsproxy.io/?" + encodeURIComponent(apiUrl);

        function fetchBus() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", proxy, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    processETA(data.data, '260C', 'bus1');
                    processETA(data.data, '60M', 'bus2');
                }
            };
            xhr.send();
        }

        function processETA(etas, route, id) {
            var el = document.getElementById(id);
            var found = false;
            for(var i=0; i<etas.length; i++) {
                if(etas[i].route === route && etas[i].dir === 'O') {
                    var diff = Math.floor((new Date(etas[i].eta) - new Date()) / 60000);
                    el.innerText = (diff <= 0) ? "即將到站" : diff + " 分鐘";
                    found = true;
                    break;
                }
            }
            if(!found) el.innerText = "未有班次";
        }
        
        fetchBus();
        setInterval(fetchBus, 30000);
    </script>
</body>
</html>
